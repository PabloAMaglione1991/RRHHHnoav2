version: '3.8'

services:
  # Base de datos (MySQL)
  db:
    image: mysql:8.0
    container_name: hospital_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - hospital_db_data:/var/lib/mysql

  # Aplicación Laravel (PHP)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hospital_app
    restart: always
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=factu30_prod_test
      - DB_USERNAME=portal_user
      - DB_PASSWORD=portal_pass
      - DB_RELOJ_HOST=db
      - DB_RELOJ_DATABASE=factu30_prod_test
      - DB_RELOJ_USERNAME=portal_user
      - DB_RELOJ_PASSWORD=portal_pass

  # Servidor Web (Nginx)
  web:
    image: nginx:alpine
    container_name: hospital_web
    restart: always
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  hospital_db_data:
